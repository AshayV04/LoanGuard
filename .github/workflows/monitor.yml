name: Daily Drift Monitor

on:
  # Runs every day at 08:00 UTC (1:30 PM IST)
  schedule:
    - cron: "0 8 * * *"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 sagemaker==2.224.0

      # ── Check drift ──────────────────────────────────────────────────────
      # Reads the latest Model Monitor report from S3.
      # Exits 0 (pass) if violations ≤ threshold.
      # Exits 1 (fail) if violations > threshold — flags this run as failed.
      - name: Check drift violations
        id: drift_check
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          VIOLATION_THRESHOLD: "5"
        run: |
          python monitoring/check_drift_report.py
        continue-on-error: true   # don't hard-fail; we handle it in the next step

      # ── Auto-retrain if drift is severe ──────────────────────────────────
      # If violations exceeded the threshold, automatically trigger retraining.
      # This closes the MLOps loop: drift detected → retrain → quality gate → redeploy.
      - name: Trigger retraining on severe drift
        if: steps.drift_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              workflow_id: 'train.yml',
              ref:     'main',
            });
            core.notice('🚨 Drift threshold exceeded — retraining pipeline triggered automatically');

      - name: Post drift summary
        if: always()
        run: |
          echo "### 📊 Daily Drift Report — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.drift_check.outcome }}" == "success" ]; then
            echo "✅ No significant drift detected. Model is healthy." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Drift violations exceeded threshold. Retraining pipeline triggered." >> $GITHUB_STEP_SUMMARY
          fi
